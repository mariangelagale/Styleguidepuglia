<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Room Luxury Stylist | Style Guide Puglia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@100;200;300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --bg-sand: #fdfdfb;
            --text-dark: #1a1a1a;
            --muted: #8e8e8e;
        }
        
        body {
            background-color: var(--bg-sand);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
        }

        h1, h2, h3, .serif { font-family: 'Bodoni Moda', serif; }

        .luxury-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-shadow: 0px 10px 30px rgba(0, 0, 0, 0.4);
        }

        .gold-text {
            color: var(--gold);
            background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #000;
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
            text-align: center;
            color: white;
        }

        .btn-cta {
            border: 1px solid white;
            color: white;
            padding: 1.2rem 3rem;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            transition: all 0.5s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 2rem;
        }

        .btn-cta:hover { background: white; color: black; }

        .lang-switcher {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 100;
            display: flex;
            gap: 1rem;
        }

        .lang-btn {
            background: none; border: none; color: white; font-size: 0.65rem;
            text-transform: uppercase; cursor: pointer; opacity: 0.6;
        }

        .lang-btn.active { opacity: 1; border-bottom: 1px solid white; }
    </style>
</head>
<body>

    <nav class="lang-switcher">
        <button class="lang-btn active" onclick="switchLang('it')">IT</button>
        <button class="lang-btn" onclick="switchLang('en')">EN</button>
    </nav>

    <header class="hero-section">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-model-showing-luxury-dress-4112-large.mp4" type="video/mp4">
            </video>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="text-5xl md:text-7xl mb-8 luxury-title gold-text" data-i18n="title">Il Tuo Outfit Perfetto, Ora.</h1>
            <p class="text-lg md:text-xl font-light mb-10 italic" data-i18n="subtitle">La tua boutique in camera è pronta per te.</p>
            <a href="https://wa.me/393245515264" id="wa-link" class="btn-cta" data-i18n="btn">Prenota su WhatsApp</a>
        </div>
    </header>

    <script>
        const translations = {
            it: {
                title: "Il Tuo Outfit Perfetto, Ora.",
                subtitle: "La tua boutique in camera è pronta per te.",
                btn: "Prenota su WhatsApp",
                msg: "Buongiorno! Mi trovo in Masseria e vorrei richiedere una consulenza Personal Stylist In-Room."
            },
            en: {
                title: "Your Perfect Outfit, Now.",
                subtitle: "Your in-room boutique is ready for you.",
                btn: "Book on WhatsApp",
                msg: "Hello! I am at the Masseria and I would like to request an In-Room Personal Stylist consultation."
            }
        };

        function switchLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            const encodedMsg = encodeURIComponent(translations[lang].msg);
            document.getElementById('wa-link').href = `https://wa.me/393245515264?text=${encodedMsg}`;
        }
    </script>
</body>
</html>
